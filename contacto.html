<!DOCTYPE html>
<html lang="es">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Contacto | SerTecMec
  </title>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&amp;family=Montserrat:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet"/>
  <link href="contacto.css" rel="stylesheet"/>
 </head>
 <body>
  <input class="menu-toggle" id="menuToggle" type="checkbox"/>
  <header class="site-header">
   <label aria-label="Abrir menú" class="menu-button" for="menuToggle">
    ☰
   </label>
   <a aria-label="Ir al inicio de SerTecMec" class="header-brand" href="index.html">
    <img alt="Logo de SerTecMec" class="header-brand-image" src="assets/logo-sertemecc.png"/>
    <span class="header-brand-name">
     SERTECMEC
     <span>
      &amp; HIDRÁULICAA S.A DE C.V
     </span>
    </span>
   </a>
  </header>
  <aside class="drawer">
   <label aria-label="Cerrar menú" class="drawer-close" for="menuToggle">
    ×
   </label>
   <strong>
    SerTecMec
   </strong>
   <nav>
    <a href="index.html">
     Inicio
    </a>
    <a href="servicios.html">
     Servicios
    </a>
    <a href="nosotros.html">
     Nosotros
    </a>
    <a class="active" href="contacto.html">
     Contacto
    </a>
   </nav>
  </aside>
  <label aria-label="Cerrar menú" class="drawer-backdrop" for="menuToggle">
  </label>
  <main>
   <section class="contact page-section">
    <form class="contact-form" id="contactForm">
     <p class="eyebrow">
      Contactanos
     </p>
     <h1>
      Solicita atencion tecnica
     </h1>
     <div class="contact-grid">
      <p>
       <strong>
        Telefono
       </strong>
       <br/>
       314 148 3820
      </p>
      <p>
       <strong>
        Correo
       </strong>
       <br/>
       tachi8547@hotmail.com
      </p>
      <p>
       <strong>
        Direccion
       </strong>
       <br/>
       Triton #580, entre Escalarias y Pajaritas, Col. Marimar I, Manzanillo, Col.
      </p>
     </div>
     <div class="form-grid">
      <label>
       Nombre completo
       <input id="fullName" name="Nombre completo" placeholder="Tu nombre" required="" type="text"/>
      </label>
      <label>
       Correo electronico
       <input id="email" name="Correo electronico" placeholder="correo@ejemplo.com" required="" type="email"/>
      </label>
      <label>
       Compania
       <input id="company" name="Compania" placeholder="Nombre de tu compania" type="text"/>
      </label>
      <label>
       Numero de telefono / WhatsApp
       <input id="phone" name="Telefono o WhatsApp" placeholder="Tu numero de contacto" required="" type="tel"/>
      </label>
     </div>
     <label>
      Mensaje
      <textarea id="message" name="Mensaje" placeholder="Describe el servicio que necesitas" required=""></textarea>
     </label>
     <div class="form-actions">
      <button type="submit">
       Enviar
      </button>
     </div>
    </form>
   </section>
  </main>
  <footer class="studio-footer">
   <span>
    Design by:
   </span>
   <a href="https://sd7zhw74ry-del.github.io/market_studios/data_html/index.html">
    Market Studios
   </a>
  </footer>
  <script src="contacto.js">
  </script>
 </body>
</html>
